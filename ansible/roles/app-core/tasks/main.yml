---
- name: Actualizar cache apt
  apt:
    update_cache: yes

- name: Instalar dependencias app-core
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - curl
    state: present

- name: Crear directorio app-core
  file:
    path: /opt/app-core
    state: directory
    mode: '0755'

- name: Crear entorno virtual
  command: python3 -m venv /opt/app-core/venv
  args:
    creates: /opt/app-core/venv/bin/activate

- name: Instalar librerias Python en venv
  pip:
    name:
      - fastapi
      - "uvicorn[standard]"
      - sqlalchemy
      - asyncpg
      - python-dotenv
      - "pydantic[email]"
      - prometheus-client
    virtualenv: /opt/app-core/venv

- name: Crear archivo .env
  copy:
    dest: /opt/app-core/.env
    content: |
      APP_NAME=reservas-core
      APP_ENV=development
      DATABASE_URL=postgresql+asyncpg://reservas:reservas123@10.10.0.5:5432/reservasdb
      PORT=8001
