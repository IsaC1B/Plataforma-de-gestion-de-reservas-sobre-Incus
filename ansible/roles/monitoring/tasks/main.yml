---
- name: Actualizar cache apt
  apt:
    update_cache: yes

- name: Instalar dependencias base
  apt:
    name:
      - curl
      - wget
      - apt-transport-https
      - software-properties-common
      - tar
    state: present

- name: Descargar Node Exporter
  get_url:
    url: https://github.com/prometheus/node_exporter/releases/download/v1.8.1/node_exporter-1.8.1.linux-amd64.tar.gz
    dest: /tmp/node_exporter.tar.gz

- name: Extraer Node Exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: yes

- name: Mover binario node_exporter
  copy:
    src: /tmp/node_exporter-1.8.1.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: '0755'
    remote_src: yes

- name: Servicio systemd node_exporter
  copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      ExecStart=/usr/local/bin/node_exporter
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Descargar Prometheus
  get_url:
    url: https://github.com/prometheus/prometheus/releases/download/v2.52.0/prometheus-2.52.0.linux-amd64.tar.gz
    dest: /tmp/prometheus.tar.gz

- name: Crear directorio Prometheus
  file:
    path: /opt/prometheus
    state: directory

- name: Extraer Prometheus
  unarchive:
    src: /tmp/prometheus.tar.gz
    dest: /opt/prometheus/
    remote_src: yes
    extra_opts: ['--strip-components=1']

- name: Configurar prometheus.yml
  copy:
    dest: /opt/prometheus/prometheus.yml
    content: |
      global:
        scrape_interval: 30s
        evaluation_interval: 30s

      scrape_configs:
        - job_name: node-control
          static_configs:
            - targets: ['10.10.0.2:9100']

        - job_name: app-api
          static_configs:
            - targets: ['10.10.0.3:9100', '10.10.0.3:8000']

        - job_name: app-core
          static_configs:
            - targets: ['10.10.0.4:9100', '10.10.0.4:8001']

        - job_name: db-postgres
          static_configs:
            - targets: ['10.10.0.5:9100']

        - job_name: monitoring
          static_configs:
            - targets: ['10.10.0.6:9100']

        - job_name: ceph-node
          static_configs:
            - targets: ['10.10.0.7:9100']

- name: Servicio systemd Prometheus
  copy:
    dest: /etc/systemd/system/prometheus.service
    content: |
      [Unit]
      Description=Prometheus
      After=network.target

      [Service]
      ExecStart=/opt/prometheus/prometheus \
        --config.file=/opt/prometheus/prometheus.yml \
        --storage.tsdb.path=/opt/prometheus/data \
        --storage.tsdb.retention.time=7d \
        --web.listen-address=0.0.0.0:9090
      Restart=always

      [Install]
      WantedBy=multi-user.target

- name: Agregar clave GPG Grafana
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present

- name: Agregar repositorio Grafana
  apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana

- name: Instalar Grafana
  apt:
    name: grafana
    state: present
    update_cache: yes

- name: Iniciar todos los servicios de monitoreo
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop:
    - node_exporter
    - prometheus
    - grafana-server
